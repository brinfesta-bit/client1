// Carrega o Firebase via CDN (compat, sem build step) — injeta scripts uma vez
function useFirebase() {
  const [ready, setReady] = useState(false);
  const [db, setDb] = useState(null);
  useEffect(() => {
    const existing = window.firebase;
    function init() {
      if (!window.firebase.apps.length) {
        window.firebase.initializeApp(firebaseConfig);
      }
      window.firebase.auth().signInAnonymously().catch(e => console.error("Auth erro:", e));
      setDb(window.firebase.firestore());
      setReady(true);
    }
    if (existing && existing.firestore) {
      init();
      return;
    }
    const scripts = ["https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js", "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js", "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"];
    let loaded = 0;
    scripts.forEach(src => {
      const s = document.createElement("script");
      s.src = src;
      s.onload = () => {
        loaded += 1;
        if (loaded === scripts.length) init();
      };
      document.head.appendChild(s);
    });
  }, []);
  return {
    db,
    ready
  };
}
