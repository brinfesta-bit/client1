function useFirebase() {
  const [ready, setReady] = useState(false);
  const [db, setDb] = useState(null);
  const [authError, setAuthError] = useState(null);

  useEffect(() => {
    firebase.auth().signInAnonymously()
      .then(() => {
        setDb(firebase.firestore());
        setReady(true);
      })
      .catch((e) => {
        console.error("Erro de autenticação:", e);
        setAuthError(e.message);
        setReady(true);
      });
  }, []);

  return { db, ready, authError };
}

function LoginScreen({ mesa, onLogin }) {
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [error, setError] = useState("");

  const formatPhone = (v) => {
    const d = v.replace(/\D/g, "").slice(0, 11);
    if (d.length <= 2) return d;
    if (d.length <= 7) return `(${d.slice(0, 2)}) ${d.slice(2)}`;
    return `(${d.slice(0, 2)}) ${d.slice(2, 7)}-${d.slice(7)}`;
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (name.trim().length < 2) return setError("Digite seu nome completo");
    const digits = phone.replace(/\D/g, "");
    if (digits.length < 10) return setError("Digite um telefone válido com DDD");
    setError("");
    onLogin({ name: name.trim(), phone: digits });
  };

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(165deg, #0B4F6C 0%, #0E6B8F 45%, #1F8A70 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "24px", position: "relative", overflow: "hidden" }}>

            <span style={{ fontSize: "36px" }}>🌴</span>
          </div>
          <h1 style={{ fontFamily: "'Baloo 2', cursive", color: "#FFD23F", fontSize: "34px", margin: 0 }}>Tropical Bar</h1>
          <p style={{ color: "rgba(255,255,255,0.85)", fontSize: "14.5px", marginTop: "6px", fontStyle: "italic" }}>Onde o atendimento faz a diferença</p>
        </div>
        <div style={{ background: "#F7F4ED", borderRadius: "24px", padding: "28px 24px", boxShadow: "0 20px 50px rgba(0,0,0,0.25)" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: "20px" }}>
            <div style={{ background: "#FF6B35", color: "white", fontWeight: 700, fontSize: "13px", padding: "6px 14px", borderRadius: "999px", fontFamily: "'Baloo 2', cursive" }}>📷 Mesa {mesa}</div>
          </div>
          <form onSubmit={handleSubmit}>
            <label style={{ fontSize: "13px", fontWeight: 600, color: "#1A2B2E", marginBottom: "6px", display: "block" }}>Seu nome</label>
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Como podemos te chamar?"
              style={{ width: "100%", padding: "12px 14px", borderRadius: "12px", border: "1.5px solid #D8D2C2", fontSize: "15px", outline: "none", marginBottom: "16px", fontFamily: "inherit" }} />

            <button onClick={copyPix} style={{ background: copied ? "#1F8A70" : "#0B4F6C", color: "white", border: "none", borderRadius: "8px", padding: "6px 12px", fontSize: "12.5px", fontWeight: 600, cursor: "pointer" }}>{copied ? "Copiado!" : "Copiar"}</button>
          </div>
          <p style={{ fontSize: "12.5px", color: "#7A7568", marginBottom: "16px" }}>Faça o Pix de {fmt(total)} e toque no botão abaixo. O garçom vai confirmar o recebimento.</p>
          <button onClick={handlePixConfirm} style={{ width: "100%", background: "#1F8A70", color: "white", border: "none", borderRadius: "14px", padding: "14px", fontWeight: 700, fontFamily: "'Baloo 2', cursive", fontSize: "15px", cursor: "pointer" }}>Já fiz o Pix</button>
          <button onClick={() => setMethod(null)} style={{ width: "100%", background: "none", border: "none", color: "#7A7568", padding: "12px", fontSize: "13px", cursor: "pointer" }}>Voltar</button>
        </div>
      )}

      {method === "cartao" && (
        <div style={{ background: "white", borderRadius: "16px", padding: "20px", border: "1.5px solid #EEEAE0" }}>
          <p style={{ fontWeight: 700, color: "#1A2B2E", marginTop: 0, fontFamily: "'Baloo 2', cursive" }}>Pagar com cartão</p>
          <p style={{ fontSize: "13px", color: "#7A7568", margin: "0 0 16px" }}>O garçom vai até sua mesa com a maquininha para você pagar com crédito ou débito.</p>
          <button onClick={handleCardRequest} disabled={processing} style={{ width: "100%", background: "#FF6B35", color: "white", border: "none", borderRadius: "14px", padding: "14px", fontWeight: 700, fontFamily: "'Baloo 2', cursive", fontSize: "15px", cursor: "pointer" }}>
            {processing ? "Chamando garçom..." : "Chamar garçom com a maquininha"}
          </button>
          <button onClick={() => setMethod(null)} style={{ width: "100%", background: "none", border: "none", color: "#7A7568", padding: "12px", fontSize: "13px", cursor: "pointer" }}>Voltar</button>
        </div>
      )}
    </div>
  );
}

function SuccessScreen({ name }) {
  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(165deg, #0B4F6C 0%, #1F8A70 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px", textAlign: "center" }}>
      <div style={{ width: "84px", height: "84px", borderRadius: "50%", background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: "20px", fontSize: "40px" }}>🎉</div>
      <h1 style={{ fontFamily: "'Baloo 2', cursive", color: "white", fontSize: "26px", margin: 0 }}>Obrigada, {name.split(" ")[0]}!</h1>
      <p style={{ color: "rgba(255,255,255,0.85)", fontSize: "14.5px", marginTop: "8px", maxWidth: "280px" }}>Seu pagamento foi confirmado. Esperamos te ver de novo em breve, volte sempre! 🌴</p>
      <div style={{ display: "flex", gap: "14px", marginTop: "32px" }}>
        <a href={SOCIAL.whatsapp} target="_blank" rel="noreferrer" style={{ width: "52px", height: "52px", borderRadius: "16px", background: "#25D366", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "24px", textDecoration: "none" }}>💬</a>
        <a href={SOCIAL.instagram} target="_blank" rel="noreferrer" style={{ width: "52px", height: "52px", borderRadius: "16px", background: "#E1306C", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "24px", textDecoration: "none" }}>📷</a>
        <a href={SOCIAL.facebook} target="_blank" rel="noreferrer" style={{ width: "52px", height: "52px", borderRadius: "16px", background: "#1877F2", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "24px", color: "white", textDecoration: "none", fontWeight: 700 }}>f</a>
      </div>
      <p style={{ color: "rgba(255,255,255,0.55)", fontSize: "12px", marginTop: "28px" }}>Siga a gente e fique por dentro das novidades da praia</p>
    </div>
  );
}

function StatusBadge({ status }) {
  const map = {
    pendente: { label: "Aguardando", color: "#FF6B35", bg: "#FFF1E8" },
    preparo: { label: "Em preparo", color: "#0B4F6C", bg: "#E6F0F5" },
    entregue: { label: "Entregue", color: "#1F8A70", bg: "#E6F5EF" },
  };
  const s = map[status] || map.pendente;
  return <span style={{ fontSize: "11.5px", fontWeight: 700, color: s.color, background: s.bg, padding: "4px 10px", borderRadius: "999px" }}>{s.label}</span>;
}

function App() {
  const mesa = getMesaFromURL();
  const { db, ready, authError } = useFirebase();
  const [user, setUser] = useState(null);
  const [cart, setCart] = useState({});
  const [pedidos, setPedidos] = useState([]);
  const [tableDoc, setTableDoc] = useState({ paymentStatus: "unpaid", paymentMethod: null });
  const [activeCat, setActiveCat] = useState("bebidas");
  const [cartOpen, setCartOpen] = useState(false);
  const [view, setView] = useState("menu");
  const [sending, setSending] = useState(false);

  useEffect(() => {
    if (!db) return;
    const unsub = db.collection("mesas").doc(mesa).onSnapshot((doc) => {
      if (doc.exists) setTableDoc(doc.data());
    }, (err) => console.error("Erro listener mesa:", err));
    return unsub;
  }, [db, mesa]);

  useEffect(() => {
    if (!db) return;
    const unsub = db.collection("mesas").doc(mesa).collection("pedidos")
      .orderBy("sentAt", "asc")
      .onSnapshot((snap) => {
        setPedidos(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
      }, (err) => console.error("Erro listener pedidos:", err));
    return unsub;
  }, [db, mesa]);

  const allItems = Object.values(MENU).flatMap((c) => c.items);
  const addToCart = (id) => setCart((c) => ({ ...c, [id]: (c[id] || 0) + 1 }));
  const removeFromCart = (id) => setCart((c) => {
    const next = { ...c, [id]: Math.max(0, (c[id] || 0) - 1) };
    if (next[id] === 0) delete next[id];
    return next;
  });

  const cartItems = Object.entries(cart).map(([id, qty]) => ({ item: allItems.find((i) => i.id === id), qty }));
  const cartTotal = cartItems.reduce((s, { item, qty }) => s + item.price * qty, 0);
  const cartCount = Object.values(cart).reduce((s, q) => s + q, 0);
  const orderTotal = pedidos.reduce((s, i) => s + i.price * i.qty, 0);

  const confirmOrder = async () => {
    if (!db) return;
    setSending(true);
    try {
      const tableRef = db.collection("mesas").doc(mesa);
      await tableRef.set({ cliente: user, paymentStatus: tableDoc.paymentStatus || "unpaid" }, { merge: true });
      const batch = db.batch();
      cartItems.forEach(({ item, qty }) => {
        const ref = tableRef.collection("pedidos").doc();
        batch.set(ref, {
          itemId: item.id,
          name: item.name,
          price: item.price,
          qty,
          status: "pendente",
          sentAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      });
      await batch.commit();
      setCart({});
      setCartOpen(false);
    } catch (e) {
      console.error("Erro ao enviar pedido:", e);
      alert("Não foi possível enviar o pedido. Verifique sua conexão e tente novamente.");
    } finally {
      setSending(false);
    }
  };

  const handlePaid = async (method, status) => {
    if (!db) return;
    await db.collection("mesas").doc(mesa).set({ paymentMethod: method, paymentStatus: status }, { merge: true });
  };

  if (!ready) {
    return (
      <div style={{ minHeight: "100vh", background: "#0B4F6C", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div className="spin" style={{ fontSize: "32px" }}>🌴</div>
      </div>
    );
  }

  if (authError) {
    return (
      <div style={{ minHeight: "100vh", background: "#0B4F6C", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "24px", textAlign: "center" }}>
        <p style={{ color: "white", fontWeight: 700, marginBottom: "8px" }}>Não foi possível conectar</p>
        <p style={{ color: "rgba(255,255,255,0.7)", fontSize: "13px" }}>Verifique se o login Anônimo está ativado no Firebase Authentication.</p>
      </div>
    );
  }

  if (!user) return <LoginScreen mesa={mesa} onLogin={setUser} />;
  if (tableDoc.paymentStatus === "paid") return <SuccessScreen name={user.name} />;

  return (
    <div style={{ fontFamily: "'Inter', sans-serif", background: "#F7F4ED", minHeight: "100vh", paddingBottom: cartCount > 0 ? "84px" : "0" }}>
      <div style={{ background: "linear-gradient(135deg, #0B4F6C, #0E6B8F)", padding: "18px 18px 0", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: "-30px", right: "-20px", width: "120px", height: "120px", borderRadius: "50%", background: "rgba(255,210,63,0.25)" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", position: "relative", zIndex: 1 }}>
          <div>
            <p style={{ color: "rgba(255,255,255,0.75)", fontSize: "12.5px", margin: 0 }}>Olá, {user.name.split(" ")[0]} 👋</p>
            <h1 style={{ fontFamily: "'Baloo 2', cursive", color: "#FFD23F", fontSize: "24px", margin: "2px 0 0" }}>Tropical Bar</h1>
          </div>
          <div style={{ background: "rgba(255,255,255,0.15)", color: "white", fontWeight: 700, fontSize: "12.5px", padding: "8px 12px", borderRadius: "12px", border: "1px solid rgba(255,255,255,0.25)" }}>📷 Mesa {mesa}</div>
        </div>

        {pedidos.length > 0 && (
          <button onClick={() => setView(view === "payment" ? "menu" : "payment")}
            style={{ marginTop: "14px", width: "100%", background: "rgba(255,255,255,0.12)", border: "1px solid rgba(255,255,255,0.25)", borderRadius: "14px", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", color: "white", cursor: "pointer" }}>
            <span style={{ fontSize: "13px" }}>🧾 Sua conta até agora: <strong>{fmt(orderTotal)}</strong></span>
            <span>→</span>
          </button>
        )}

        <div style={{ height: "16px" }} />
        <WaveDivider fill="#F7F4ED" />
      </div>

      {view === "payment" ? (
        <>
          <div style={{ padding: "16px 18px 0", display: "flex", alignItems: "center", gap: "10px" }}>
            <button onClick={() => setView("menu")} style={{ background: "white", border: "1px solid #EEEAE0", borderRadius: "10px", width: "36px", height: "36px", cursor: "pointer" }}>←</button>
            <h2 style={{ fontFamily: "'Baloo 2', cursive", fontSize: "19px", color: "#1A2B2E", margin: 0 }}>Fechar a conta</h2>
          </div>
          <div style={{ padding: "0 18px" }}>
            {pedidos.map((i) => (
              <div key={i.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontSize: "13.5px", color: "#3A3530" }}>
                <span>{i.qty}× {i.name}</span>
                <span style={{ fontWeight: 600 }}>{fmt(i.price * i.qty)}</span>
              </div>
            ))}
          </div>
          <PaymentScreen total={orderTotal} onPaid={handlePaid} paymentStatus={tableDoc.paymentStatus} paymentMethod={tableDoc.paymentMethod} />
        </>
      ) : (
        <>
          <div style={{ display: "flex", gap: "10px", padding: "14px 18px 6px", overflowX: "auto" }}>
            {Object.entries(MENU).map(([key, cat]) => {
              const active = activeCat === key;
              return (
                <button key={key} onClick={() => setActiveCat(key)}
                  style={{ flexShrink: 0, display: "flex", alignItems: "center", gap: "6px", padding: "10px 16px", borderRadius: "999px", border: active ? "none" : "1.5px solid #E5E0D4", background: active ? "#FF6B35" : "white", color: active ? "white" : "#5A5648", fontWeight: 700, fontSize: "13.5px", cursor: "pointer", fontFamily: "'Baloo 2', cursive" }}>
                  {cat.emoji} {cat.label}
                </button>
              );
            })}
          </div>

          <div style={{ padding: "12px 18px", display: "flex", flexDirection: "column", gap: "10px" }}>
            {MENU[activeCat].items.map((item) => (
              <MenuItemCard key={item.id} item={item} qty={cart[item.id] || 0} onAdd={addToCart} onRemove={removeFromCart} />
            ))}
          </div>

          {pedidos.length > 0 && (
            <div style={{ padding: "4px 18px 24px" }}>
              <h3 style={{ fontFamily: "'Baloo 2', cursive", fontSize: "15px", color: "#1A2B2E", margin: "8px 0" }}>Pedidos enviados</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                {pedidos.slice().reverse().map((i) => (
                  <div key={i.id} style={{ background: "white", borderRadius: "12px", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", border: "1px solid #EEEAE0" }}>
                    <span style={{ fontSize: "13.5px", color: "#1A2B2E" }}>{i.qty}× {i.name}</span>
                    <StatusBadge status={i.status} />
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}

      {cartCount > 0 && view === "menu" && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: "480px", padding: "12px 18px 18px", background: "linear-gradient(to top, #F7F4ED 70%, transparent)" }}>
          <button onClick={() => setCartOpen(true)} style={{ width: "100%", background: "#1A2B2E", color: "white", border: "none", borderRadius: "16px", padding: "15px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer", boxShadow: "0 10px 24px rgba(0,0,0,0.25)" }}>
            <span style={{ display: "flex", alignItems: "center", gap: "10px", fontWeight: 700, fontFamily: "'Baloo 2', cursive" }}>
              <span style={{ background: "#FF6B35", borderRadius: "50%", width: "24px", height: "24px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12.5px" }}>{cartCount}</span>
              Ver pedido
            </span>
            <span style={{ fontWeight: 800 }}>{fmt(cartTotal)}</span>
          </button>
        </div>
      )}

      <CartSheet open={cartOpen} onClose={() => setCartOpen(false)} cartItems={cartItems} onAdd={addToCart} onRemove={removeFromCart} onConfirm={confirmOrder} total={cartTotal} sending={sending} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
